name: Deploy di Astro su GitHub Pages

on:
  push:
    branches: [ main ] # Cambia in "master" se il tuo ramo principale si chiama così

# Permessi necessari per gestire il deploy su GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Cambia in 'pnpm' o 'yarn' se usi altri package manager

      - name: Installa le dipendenze
        run: npm ci

      - name: Compila il progetto Astro
        run: npm run build

      - name: Carica l'artefatto per il Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4